name: Sync Upstream Tags & Main

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Give the runner permission to push changes to your repo
permissions:
  contents: write
  workflows: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Added to handle Node.js deprecation early
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Upstream
        run: |
          # 1. Setup the upstream remote pointing to the Red Hat source
          git remote add upstream https://github.com/terraform-redhat/terraform-provider-rhcs.git
          
          # 2. Fetch all branches and tags from upstream
          git fetch upstream --tags
          
          # 3. Ensure we are on main and merge upstream/main
          git checkout main
          git merge upstream/main --ff-only
          
          # 4. Push the updated main branch and all tags to your origin (nedoshi)
          git push origin main
          git push origin --tags
