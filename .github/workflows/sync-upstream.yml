name: Sync Upstream Tags & Main

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows you to run this manually from the "Actions" tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential: Fetches all history and tags

      - name: Sync with Upstream
        run: |
          # 1. Setup the upstream remote
          git remote add upstream /terraform-redhat/terraform-provider-rhcs.git
          
          # 2. Fetch all branches and tags from upstream
          git fetch upstream --tags
          
          # 3. Ensure we are on main and merge upstream/main
          git checkout main
          git merge upstream/main --ff-only
          
          # 4. Push the updated main branch and all tags to your origin
          git push origin main
          git push origin --tags
